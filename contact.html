<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | BeatleStudio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@100;400;500&display=swap" rel="stylesheet">
    
    <script>
        if(localStorage.getItem("theme") === "light") {
            document.documentElement.setAttribute("data-theme", "light");
        }
    </script>

    <style>
        :root { --transition-speed: 0.3s; --bg-color: #050505; --text-main: #ffffff; --text-muted: #666666; --border-color: #222222; --card-bg: #0d0d0d;}
        [data-theme="light"] { --bg-color: #ffffff; --text-main: #000000; --text-muted: #888888; --border-color: #e5e5e5; --card-bg: #fafafa;}
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent !important; outline: none !important; -webkit-user-select: none; user-select: none; }
        
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100dvh; padding-top: 80px; transition: background-color var(--transition-speed), color var(--transition-speed); }
        a { text-decoration: none; color: inherit; }

        /* HEADER */
        .top-controls { position: fixed; top: 0; left: 0; width: 100%; height: 80px; padding: 0 4rem; display: flex; justify-content: space-between; align-items: center; background-color: transparent; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); z-index: 1000; }
        .logo-text { font-size: 1.2rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; transition: transform 0.2s ease;}
        .logo-text span { color: var(--text-muted); font-weight: 300; }
        .logo-text:hover { transform: scale(1.05); }
        .header-right { display: flex; align-items: center; gap: 2rem; }

        /* THEME TOGGLE */
        .theme-switch-container { display: flex; align-items: center; gap: 0.5rem; }
        .theme-icon { width: 14px; height: 14px; color: var(--text-muted); }
        :root:not([data-theme="light"]) .theme-icon.moon { color: var(--text-main); }
        [data-theme="light"] .theme-icon.sun { color: var(--text-main); }
        .theme-toggle-switch { position: relative; width: 40px; height: 22px; border: 2px solid var(--text-main); border-radius: 30px; cursor: pointer; }
        .theme-toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--text-main); transition: transform 0.3s; }
        [data-theme="light"] .theme-toggle-switch::after { transform: translateX(18px); }
        .menu-btn { cursor: pointer; color: var(--text-main); }
        .menu-btn svg { width: 24px; height: 24px; }

        /* MENU */
        .fullscreen-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; z-index: 2000; }
        .fullscreen-menu.active { opacity: 1; pointer-events: auto; }
        .close-menu-btn { position: absolute; top: 2rem; right: 4rem; cursor: pointer; }
        .close-menu-btn svg { width: 32px; height: 32px; color: var(--text-main); }
        .menu-links { display: flex; flex-direction: column; gap: 2.5rem; text-align: center; }
        .menu-links a { font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--text-muted); transition: all 0.3s ease; }
        .menu-links a:hover { color: var(--text-main); transform: translateY(-2px); }

        /* CONTACT CONTENT */
        .container { width: 100%; max-width: 800px; display: flex; flex-direction: column; flex: 1; padding: 4rem 2rem; gap: 3rem; }
        h1 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 800; letter-spacing: -1px; }
        
        .links-grid { display: flex; flex-direction: column; gap: 1.5rem; }
        
        .social-link { 
            display: flex; align-items: center; gap: 1.5rem; padding: 1.5rem 2rem; 
            background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; 
            font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; 
            transition: all 0.3s ease; cursor: pointer !important; color: var(--text-main);
            position: relative; z-index: 10;
            -webkit-user-select: auto; user-select: auto; 
        }
        .social-link:hover { border-color: var(--text-main); transform: translateX(10px); }
        .social-link svg { width: 24px; height: 24px; fill: currentColor; }
        .social-link svg.stroke-icon { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .app-footer { width: 100%; text-align: center; font-size: 0.65rem; color: var(--text-muted); letter-spacing: 1px; padding: 2rem; margin-top: auto; }
        
        @media (max-width: 768px) { .top-controls { padding: 0 1.5rem; } .header-right { gap: 1.25rem; } .close-menu-btn { top: 1.5rem; right: 1.5rem; } }
    </style>
</head>
<body>
    <div class="top-controls">
        <div class="logo-text" onclick="window.location.href='index.html'">Beatle<span>Studio</span></div>
        <div class="header-right">
            <div class="theme-switch-container">
                <svg class="theme-icon moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <div class="theme-toggle-switch" onclick="toggleTheme()"></div>
                <svg class="theme-icon sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line></svg>
            </div>
            <div class="menu-btn" onclick="openMenu()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg></div>
        </div>
    </div>

    <div class="fullscreen-menu" id="fullscreen-menu">
        <div class="close-menu-btn" onclick="closeMenu()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
        <div class="menu-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <div class="container">
        <h1>Connect.</h1>
        <div class="links-grid">
            
            <a href="https://www.instagram.com/notbeatle?igsh=dW50dndxd2JzajZ0" class="social-link" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
                Instagram
            </a>

            <a href="https://x.com/Prathameshxv" class="social-link" target="_blank" rel="noopener noreferrer">
                <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                Twitter (X)
            </a>

            <a href="mailto:hello@beatlestudio.com" class="social-link" rel="noopener noreferrer">
                <svg class="stroke-icon" viewBox="0 0 24 24">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                Email
            </a>

        </div>
    </div>

    <footer class="app-footer">&copy; 2026 BeatleStudio. All Rights Reserved.</footer>

    <script>
        document.addEventListener('contextmenu', e => e.preventDefault()); 
        document.addEventListener('copy', e => e.preventDefault()); 
        document.addEventListener('cut', e => e.preventDefault());
        
        function toggleTheme() {
            const html = document.documentElement;
            if (html.hasAttribute("data-theme")) { html.removeAttribute("data-theme"); localStorage.setItem("theme", "dark"); } 
            else { html.setAttribute("data-theme", "light"); localStorage.setItem("theme", "light"); }
        }
        function openMenu() { document.getElementById('fullscreen-menu').classList.add('active'); }
        function closeMenu() { document.getElementById('fullscreen-menu').classList.remove('active'); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity | Speed Test by BeatleStudio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@100;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-muted: #666666;
            --border-color: #222222;
            --arc-empty: #1a1a1a;
            --accent-color: #4ade80;
            --error-color: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            selection-background: #ffffff;
            selection-color: #000000;
            position: relative; 
        }

        /* --- Back Arrow --- */
        .back-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10;
        }

        .back-btn svg {
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        .back-btn:hover svg {
            transform: translateX(-5px);
        }

        /* --- Header --- */
        .app-header {
            position: absolute;
            top: 2.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            transition: all 0.3s ease;
        }

        .app-title {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 8px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .app-subtitle {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .app-subtitle span {
            color: var(--text-main);
            font-weight: 600;
        }

        /* --- Main App Container --- */
        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 3rem; 
            transition: all 0.3s ease;
        }

        .status-text {
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 2rem;
            height: 20px;
            transition: color 0.3s;
        }

        /* --- Speedometer UI --- */
        .speedometer-container {
            position: relative;
            width: 300px;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 3rem;
            transition: all 0.3s ease;
        }

        .speedometer-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .speed-arc-bg {
            fill: none;
            stroke: var(--arc-empty);
            stroke-width: 8;
            stroke-linecap: round;
        }

        .speed-arc-progress {
            fill: none;
            stroke: var(--text-main);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 283;
            stroke-dashoffset: 283; 
            transition: stroke-dashoffset 0.1s linear;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        .main-display {
            display: flex;
            align-items: baseline;
            position: relative;
            z-index: 2;
            margin-bottom: -10px;
        }

        .main-number {
            font-family: 'JetBrains Mono', monospace;
            font-size: 4.5rem;
            font-weight: 100;
            line-height: 1;
            letter-spacing: -2px;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .main-unit {
            font-size: 1rem;
            color: var(--text-muted);
            margin-left: 0.75rem;
            font-weight: 400;
            transition: all 0.3s ease;
        }

        /* --- Metrics Grid --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            width: 100%;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 2rem 0;
            margin-bottom: 3rem;
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
            transition: all 0.3s ease;
        }

        .metric {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--border-color);
        }

        .metric:last-child { border-right: none; }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            transition: all 0.3s ease;
        }

        .metric-value-container {
            display: flex;
            align-items: baseline;
        }

        .metric-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 400;
            transition: all 0.3s ease;
        }

        .metric-unit {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: 0.25rem;
        }

        /* --- Button --- */
        .btn {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--text-main);
            padding: 1rem 3rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            outline: none;
            border-radius: 2px;
        }

        .btn::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background-color: var(--text-main);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: -1;
        }

        .btn:hover:not(:disabled) {
            color: var(--bg-color);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(255, 255, 255, 0.4);
        }

        .btn:hover:not(:disabled)::before { height: 100%; }
        .btn:active:not(:disabled) { transform: translateY(0); }
        .btn:disabled {
            border-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            pointer-events: none;
        }

        /* --- Copyright Footer --- */
        .studio-footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.4;
            transition: all 0.3s ease;
            text-align: center;
        }

        .studio-footer:hover { opacity: 1; }
        .studio-footer span { color: var(--text-main); font-weight: 600; }

        /* Desktop & Tablet Scaling */
        @media (min-width: 768px) {
            .app-title { font-size: 1.6rem; }
            .app-subtitle { font-size: 0.8rem; }
            .container { max-width: 800px; padding: 4rem 2rem; }
            .speedometer-container { width: 450px; height: 260px; margin-bottom: 4rem; }
            .speed-arc-bg, .speed-arc-progress { stroke-width: 6; } 
            .main-number { font-size: 7.5rem; }
            .main-unit { font-size: 1.5rem; margin-left: 1rem; }
            .metrics-grid { padding: 3rem 0; margin-bottom: 4rem; }
            .metric-label { font-size: 0.85rem; margin-bottom: 1rem; }
            .metric-value { font-size: 2.2rem; }
            .metric-unit { font-size: 0.9rem; }
            .btn { font-size: 1.1rem; padding: 1.2rem 4rem; }
            .studio-footer { font-size: 0.8rem; bottom: 2.5rem; }
            .back-btn { top: 2.5rem; left: 3rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back
    </a>

    <header class="app-header">
        <div class="app-title">Velocity</div>
        <div class="app-subtitle">Powered by <span>BeatleStudio</span></div>
    </header>

    <div class="container">
        <div class="status-text" id="status">Ready</div>

        <div class="speedometer-container">
            <svg viewBox="0 0 200 110" class="speedometer-svg">
                <path class="speed-arc-bg" d="M 10,100 A 90,90 0 0,1 190,100" />
                <path class="speed-arc-progress" id="speed-arc" d="M 10,100 A 90,90 0 0,1 190,100" />
            </svg>
            
            <div class="main-display">
                <div class="main-number" id="main-speed">0.0</div>
                <div class="main-unit">Mbps</div>
            </div>
        </div>

        <div class="metrics-grid">
            <div class="metric">
                <div class="metric-label">Download</div>
                <div class="metric-value-container">
                    <div class="metric-value" id="dl-speed">--</div>
                    <div class="metric-unit">Mbps</div>
                </div>
            </div>
            <div class="metric">
                <div class="metric-label">Upload</div>
                <div class="metric-value-container">
                    <div class="metric-value" id="ul-speed">--</div>
                    <div class="metric-unit">Mbps</div>
                </div>
            </div>
            <div class="metric">
                <div class="metric-label">Latency</div>
                <div class="metric-value-container">
                    <div class="metric-value" id="latency">--</div>
                    <div class="metric-unit">ms</div>
                </div>
            </div>
        </div>

        <button class="btn" id="start-btn" onclick="startTest()">Begin Test</button>
    </div>

    <footer class="studio-footer">
        &copy; 2026 <span>BeatleStudio</span>. All rights reserved.
    </footer>

    <script>
        const CF_ENDPOINT = 'https://speed.cloudflare.com';
        let isRunning = false;

        function updateSpeedometer(speedMbps) {
            document.getElementById('main-speed').innerText = speedMbps.toFixed(1);
            const MAX_VISUAL_SPEED = 1000; 
            let ratio = Math.min(speedMbps / MAX_VISUAL_SPEED, 1);
            ratio = Math.pow(ratio, 0.6); 
            const maxDashoffset = 283; 
            const currentOffset = maxDashoffset - (maxDashoffset * ratio);
            document.getElementById('speed-arc').style.strokeDashoffset = currentOffset;
        }

        async function measureLatency() {
            let minLatency = Infinity;
            for (let i = 0; i < 5; i++) {
                const start = performance.now();
                await fetch(`${CF_ENDPOINT}/__down?bytes=0`, { cache: 'no-store' });
                const rtt = performance.now() - start;
                if (rtt < minLatency) minLatency = rtt;
            }
            document.getElementById('latency').innerText = minLatency.toFixed(1);
        }

        async function runDownloadTest() {
            return new Promise((resolve) => {
                const CONCURRENT_STREAMS = 5;
                const FILE_SIZE = 25000000; 
                let totalBytes = 0;
                let activeStreams = CONCURRENT_STREAMS;
                const startTime = performance.now();
                const tracker = setInterval(() => {
                    const elapsed = (performance.now() - startTime) / 1000;
                    if (elapsed > 0.1) {
                        const speedMbps = (totalBytes * 8) / (elapsed * 1000000);
                        updateSpeedometer(speedMbps);
                        document.getElementById('dl-speed').innerText = speedMbps.toFixed(1);
                    }
                }, 100);

                for (let i = 0; i < CONCURRENT_STREAMS; i++) {
                    fetch(`${CF_ENDPOINT}/__down?bytes=${FILE_SIZE}&_=${Date.now()}_${i}`, { cache: 'no-store' })
                        .then(response => {
                            const reader = response.body.getReader();
                            return reader.read().then(function processText({ done, value }) {
                                if (done) return;
                                totalBytes += value.length;
                                return reader.read().then(processText);
                            });
                        })
                        .finally(() => {
                            activeStreams--;
                            if (activeStreams === 0) {
                                clearInterval(tracker);
                                resolve();
                            }
                        });
                }
            });
        }

        async function runUploadTest() {
            return new Promise((resolve) => {
                const CONCURRENT_STREAMS = 4;
                const PAYLOAD_SIZE = 10000000; 
                const dummyData = new Uint8Array(PAYLOAD_SIZE);
                for (let i = 0; i < PAYLOAD_SIZE; i++) dummyData[i] = Math.random() * 255;
                const blob = new Blob([dummyData], { type: 'application/octet-stream' });
                let uploadedBytesList = new Array(CONCURRENT_STREAMS).fill(0);
                let activeStreams = CONCURRENT_STREAMS;
                const startTime = performance.now();

                const tracker = setInterval(() => {
                    const elapsed = (performance.now() - startTime) / 1000;
                    const totalBytes = uploadedBytesList.reduce((a, b) => a + b, 0);
                    if (elapsed > 0.1) {
                        const speedMbps = (totalBytes * 8) / (elapsed * 1000000);
                        updateSpeedometer(speedMbps);
                        document.getElementById('ul-speed').innerText = speedMbps.toFixed(1);
                    }
                }, 100);

                for (let i = 0; i < CONCURRENT_STREAMS; i++) {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `${CF_ENDPOINT}/__up?_=${Date.now()}_${i}`, true);
                    xhr.upload.onprogress = (event) => {
                        if (event.lengthComputable) {
                            uploadedBytesList[i] = event.loaded;
                        }
                    };
                    xhr.onloadend = () => {
                        activeStreams--;
                        if (activeStreams === 0) {
                            clearInterval(tracker);
                            resolve();
                        }
                    };
                    xhr.send(blob);
                }
            });
        }

        async function startTest() {
            if (isRunning) return;
            isRunning = true;
            const btn = document.getElementById('start-btn');
            const status = document.getElementById('status');

            btn.disabled = true;
            btn.innerText = 'Testing...';
            document.getElementById('dl-speed').innerText = '--';
            document.getElementById('ul-speed').innerText = '--';
            document.getElementById('latency').innerText = '--';
            status.style.color = 'var(--text-main)';
            updateSpeedometer(0);

            try {
                status.innerText = 'Measuring Ping...';
                await measureLatency();
                status.innerText = 'Testing Download...';
                await runDownloadTest();
                updateSpeedometer(0); 
                status.innerText = 'Testing Upload...';
                await runUploadTest();
                status.innerText = 'Test Complete';
                status.style.color = 'var(--accent-color)';
            } catch (error) {
                console.error(error);
                status.innerText = 'Network Error';
                status.style.color = 'var(--error-color)';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Test Again';
                isRunning = false;
            }
        }
    </script>
</body>
</html>

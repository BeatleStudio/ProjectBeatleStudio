<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beatle Studio | Site Under Construction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Base Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #000000;
            --text-primary: #ffffff;
            --text-secondary: #999999;
            --border-subtle: #242424;
        }

        body {
            font-family: "Inter", sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Layout & Spacing */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
            padding: 24px;
        }

        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 0 64px 0;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            text-transform: uppercase;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
            padding: 0 16px 48px 16px;
        }

        /* Typography */
        .badge-progress {
            display: inline-block;
            background-color: var(--border-subtle);
            color: #cccccc;
            font-size: 11px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 24px;
        }

        h1.display {
            font-size: 62px;
            font-weight: 500;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 24px;
            max-width: 800px;
        }

        p.body-text {
            font-size: 18px;
            font-weight: 400;
            line-height: 1.5;
            color: var(--text-secondary);
            max-width: 520px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 48px 0 24px 0;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Responsive Breakpoints */
        @media (max-width: 809px) {
            h1.display {
                font-size: 42px;
                margin-bottom: 16px;
            }
            
            p.body-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <header class="nav-bar">
            <div class="logo">Beatle Studio</div>
        </header>

        <main class="main-content">
            <span class="badge-progress">Work In Progress</span>
            
            <h1 class="display">Site Under Construction.</h1>
            
            <p class="body-text">We are currently laying the groundwork for a new digital experience. Please check back soon.</p>
        </main>

        <footer class="footer">
            © 2026 Beatle Studio. All rights reserved.
        </footer>
    </div>

</body>
</html>

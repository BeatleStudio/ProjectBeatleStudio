<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beatle Studio | Site Under Construction</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", sans-serif;
            background-color: #000000;
            color: #ffffff;
            /* Use dvh for perfect mobile screen fitting, fallback to vh for older browsers */
            min-height: 100vh;
            min-height: 100dvh; 
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Fluid Layout Container */
        .container {
            display: flex;
            flex-direction: column;
            flex: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            /* Fluid padding: scales based on screen width */
            padding: clamp(16px, 4vw, 32px); 
        }

        /* Header / Logo */
        header {
            text-align: center;
            padding: clamp(16px, 4vh, 48px) 0;
        }

        .logo {
            font-size: clamp(16px, 2vw, 20px);
            font-weight: 600;
            letter-spacing: -0.01em;
            text-transform: uppercase;
        }

        /* Centered Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
        }

        /* Badge */
        .badge-progress {
            display: inline-block;
            background-color: #242424;
            color: #cccccc;
            font-size: 11px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: clamp(16px, 3vh, 24px);
        }

        /* Fluid Headline: Automatically scales between 36px (mobile) and 64px (PC) */
        h1.display {
            font-size: clamp(36px, 6vw, 64px);
            font-weight: 500;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: clamp(16px, 3vh, 24px);
            max-width: 16ch; /* Prevents lines from getting too wide on ultra-wide screens */
        }

        /* Fluid Paragraph: Scales between 16px and 18px */
        p.body-text {
            font-size: clamp(16px, 2vw, 18px);
            font-weight: 400;
            line-height: 1.5;
            color: #999999;
            max-width: 500px;
            padding: 0 16px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: clamp(24px, 5vh, 48px) 0;
            font-size: 12px;
            color: #666666;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo">Beatle Studio</div>
        </header>

        <main>
            <span class="badge-progress">Work In Progress</span>
            
            <h1 class="display">Site Under Construction.</h1>
            
            <p class="body-text">We are currently laying the groundwork for a new digital experience. Please check back soon.</p>
        </main>

        <footer>
            © 2026 Beatle Studio. All rights reserved.
        </footer>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beatle Studio | Coming Soon</title>
    <!-- Importing a clean, modern font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle background glow effect */
        body::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255, 75, 75, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }

        .container {
            max-width: 700px;
            padding: 2rem;
            z-index: 1;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            line-height: 1.1;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        /* Accent color for "Studio" */
        h1 span {
            color: #ff4b4b;
            position: relative;
            display: inline-block;
        }

        p {
            font-size: 1.25rem;
            color: #a0a0a0;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .notify-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            max-width: 500px;
            margin: 0 auto;
        }

        input[type="email"] {
            flex: 1;
            padding: 1rem 1.5rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="email"]:focus {
            border-color: #ff4b4b;
        }

        button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            background: #ffffff;
            color: #0a0a0a;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #ff4b4b;
            color: #ffffff;
            transform: translateY(-2px);
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.9rem;
            color: #555;
            letter-spacing: 1px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .notify-form {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Beatle</div>
        
        <h1>Creating the<br>Next <span>Wave.</span></h1>
        
        <p>We are currently crafting a new digital experience. Enter your email below to get notified when Beatle Studio goes live.</p>
        
        <form class="notify-form" onsubmit="event.preventDefault(); alert('Thanks for subscribing!');">
            <input type="email" placeholder="Enter your email address" required>
            <button type="submit">Notify Me</button>
        </form>
    </div>

    <div class="footer">
        © 2026 BEATLE STUDIO. ALL RIGHTS RESERVED.
    </div>

</body>
</html>
